<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      max-height: 580px;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafaf9;
      color: #1c1917;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .header-stats {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .header .count {
      background: rgba(255,255,255,0.1);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e7e5e4;
    }
    .toolbar select {
      padding: 5px 8px;
      border: 1px solid #d6d3d1;
      border-radius: 6px;
      font-size: 11px;
      font-family: inherit;
      background: #fff;
      color: #44403c;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    .toolbar select:hover { border-color: #a8a29e; }
    .toolbar select:focus { border-color: #78716c; }
    .toolbar .spacer { flex: 1; }
    .toolbar button {
      padding: 5px 10px;
      border: 1px solid #d6d3d1;
      border-radius: 6px;
      background: #fff;
      font-size: 11px;
      font-family: inherit;
      font-weight: 500;
      color: #44403c;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar button:hover {
      background: #f5f5f4;
      border-color: #a8a29e;
    }
    .toolbar .clear-all {
      color: #dc2626;
      border-color: #fecaca;
    }
    .toolbar .clear-all:hover {
      background: #fef2f2;
      border-color: #f87171;
    }

    /* ── Job List ── */
    .job-list {
      max-height: 440px;
      overflow-y: auto;
      padding: 6px 12px 12px;
    }
    .job-list::-webkit-scrollbar { width: 4px; }
    .job-list::-webkit-scrollbar-track { background: transparent; }
    .job-list::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }

    /* ── Job Card ── */
    .job-card {
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 8px;
      margin-bottom: 6px;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
      overflow: hidden;
    }
    .job-card:hover {
      border-color: #d6d3d1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .job-card.expanded {
      border-color: #a8a29e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* ── Compact Row ── */
    .job-compact {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      user-select: none;
    }
    .job-compact-content { flex: 1; min-width: 0; }
    .job-compact-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    .job-compact-title {
      font-size: 13px;
      font-weight: 600;
      color: #1c1917;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .job-compact-title a {
      color: inherit;
      text-decoration: none;
    }
    .job-compact-title a:hover {
      color: #2563eb;
    }
    .job-compact-sub {
      font-size: 11px;
      color: #78716c;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-compact-sub .dot {
      margin: 0 5px;
      color: #d6d3d1;
    }

    /* ── Chevron ── */
    .chevron {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 4px;
      color: #a8a29e;
      transition: transform 0.25s ease;
      font-size: 10px;
    }
    .job-card.expanded .chevron {
      transform: rotate(180deg);
    }

    /* ── Expanded Details ── */
    .job-details {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s ease;
    }
    .job-card.expanded .job-details {
      max-height: 280px;
      opacity: 1;
    }
    .job-details-inner {
      padding: 0 14px 12px;
      border-top: 1px solid #f5f5f4;
    }

    /* ── Detail Rows ── */
    .detail-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      padding: 6px 0;
      border-bottom: 1px solid #fafaf9;
      font-size: 12px;
      color: #57534e;
    }
    .detail-row:last-of-type { border-bottom: none; }

    .detail-label {
      font-size: 10px;
      font-weight: 600;
      color: #a8a29e;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      width: 100%;
      margin-bottom: -2px;
    }
    .detail-value {
      font-size: 12px;
      color: #44403c;
    }
    .detail-value a {
      color: #2563eb;
      text-decoration: none;
    }
    .detail-value a:hover { text-decoration: underline; }
    .detail-value.salary {
      font-weight: 600;
      color: #16a34a;
    }

    .detail-tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      background: #f5f5f4;
      color: #78716c;
    }

    /* ── Status / Actions Row ── */
    .detail-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      margin-top: 4px;
      border-top: 1px solid #f5f5f4;
    }
    .detail-actions-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-actions label {
      font-size: 10px;
      font-weight: 600;
      color: #a8a29e;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .detail-actions select {
      padding: 4px 8px;
      border: 1px solid #d6d3d1;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      background: #fff;
      color: #44403c;
      cursor: pointer;
      outline: none;
    }
    .delete-btn {
      background: none;
      border: 1px solid transparent;
      color: #d6d3d1;
      cursor: pointer;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .delete-btn:hover {
      color: #dc2626;
      background: #fef2f2;
      border-color: #fecaca;
    }

    /* ── Empty State ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #a8a29e;
    }
    .empty h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #78716c;
    }
    .empty p { font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobCruncher</h1>
    <div class="header-stats">
      <div class="count" id="jobCount">0 jobs</div>
      <div class="count" id="appliedCount">0 applied</div>
    </div>
  </div>
  <div class="toolbar">
    <select id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="salary-desc">Salary ↓</option>
      <option value="salary-asc">Salary ↑</option>
      <option value="alpha-az">Title A–Z</option>
      <option value="alpha-za">Title Z–A</option>
      <option value="company-az">Company A–Z</option>
      <option value="company-za">Company Z–A</option>
    </select>
    <div class="spacer"></div>
    <button id="exportCsv">CSV</button>
    <button id="exportSheets">Sheets</button>
    <button class="clear-all" id="clearAll">Clear</button>
  </div>
  <div class="job-list" id="jobList"></div>
  <script src="popup.js"></script>
</body>
</html>
