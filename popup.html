<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 520px;
      max-height: 580px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .count {
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    .actions {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
      align-items: center;
    }
    .actions button {
      padding: 7px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .actions button:hover { background: #f1f5f9; border-color: #94a3b8; }
    .actions .export-csv { background: #16a34a; color: #fff; border-color: #16a34a; }
    .actions .export-csv:hover { background: #15803d; }
    .actions .export-sheets { background: #4285f4; color: #fff; border-color: #4285f4; }
    .actions .export-sheets:hover { background: #3367d6; }
    .actions .clear-all { background: #ef4444; color: #fff; border-color: #ef4444; }
    .actions .clear-all:hover { background: #dc2626; }
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12px;
      color: #64748b;
    }
    .sort-bar label { font-weight: 500; }
    .sort-bar select {
      padding: 4px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      cursor: pointer;
    }
    .job-list { max-height: 400px; overflow-y: auto; padding: 8px 12px; }
    .job-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: box-shadow 0.15s;
    }
    .job-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .job-title {
      font-size: 14px;
      font-weight: 700;
      color: #1e40af;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: start;
    }
    .job-title a { color: #1e40af; text-decoration: none; }
    .job-title a:hover { text-decoration: underline; }
    .job-meta { font-size: 12px; color: #64748b; line-height: 1.5; }
    .job-meta span { display: inline-block; margin-right: 12px; }
    .job-meta .salary { color: #16a34a; font-weight: 600; }
    .job-meta .hiring { color: #7c3aed; }
    .job-meta .hiring a { color: #7c3aed; text-decoration: none; }
    .job-meta .hiring a:hover { text-decoration: underline; }
    .job-meta .applicants { color: #ea580c; font-weight: 600; }
    .job-meta .elapsed { color: #0891b2; font-style: italic; }
    .job-meta .education { color: #6366f1; }
    .job-meta .seniority { color: #d946ef; font-weight: 500; }
    .job-meta .source-badge {
      background: #e0e7ff;
      color: #3730a3;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }
    .job-meta .source-badge.indeed { background: #dbeafe; color: #1d4ed8; }
    .status-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-row label { font-size: 11px; color: #94a3b8; font-weight: 500; }
    .status-row select {
      padding: 4px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      cursor: pointer;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .delete-btn:hover { color: #ef4444; background: #fef2f2; }
    .empty { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .empty h2 { font-size: 18px; margin-bottom: 8px; color: #64748b; }
    .empty p { font-size: 13px; }
    .date-badge { font-size: 10px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Job Application Tracker</h1>
    <div class="count" id="jobCount">0 jobs</div>
  </div>
  <div class="actions">
    <button class="export-csv" id="exportCsv">Export CSV</button>
    <button class="export-sheets" id="exportSheets">Google Sheets</button>
    <button class="clear-all" id="clearAll">Clear All</button>
  </div>
  <div class="sort-bar">
    <label for="sortSelect">Sort by:</label>
    <select id="sortSelect">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="salary-desc">Salary: High to Low</option>
      <option value="salary-asc">Salary: Low to High</option>
      <option value="alpha-az">Title: A - Z</option>
      <option value="alpha-za">Title: Z - A</option>
      <option value="company-az">Company: A - Z</option>
      <option value="company-za">Company: Z - A</option>
    </select>
  </div>
  <div class="job-list" id="jobList"></div>
  <script src="popup.js"></script>
</body>
</html>
